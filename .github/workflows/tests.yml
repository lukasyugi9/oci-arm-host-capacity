name: integration-tests

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run OCI Hunter Script
        run: |
          export OCI_REGION="ap-batam-1"
          export OCI_USER_OCID="${{ secrets.OCI_USER_OCID }}"
          export OCI_TENANCY_OCID="${{ secrets.OCI_TENANCY_OCID }}"
          export OCI_COMPARTMENT_OCID="${{ secrets.OCI_COMPARTMENT_OCID }}"
          export OCI_FINGERPRINT="${{ secrets.OCI_FINGERPRINT }}"
          export OCI_PRIVATE_KEY="${{ secrets.OCI_PRIVATE_KEY }}"
          export OCI_OCPUS=4
          export OCI_MEMORY_IN_GBS=24
          export OCI_BOOT_VOLUME_SIZE_IN_GBS=100
          export OCI_DISPLAY_NAME="openclaw-server"
          php index.php
