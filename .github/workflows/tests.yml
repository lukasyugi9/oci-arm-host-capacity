name: integration-tests

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Generate .env and Run Script
        env:
          OCI_REGION: ap-batam-1
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          # Membuat file .env otomatis secara aman sebelum script berjalan
          echo "OCI_REGION=$OCI_REGION" > .env
          echo "OCI_USER_OCID=$OCI_USER_OCID" >> .env
          echo "OCI_TENANCY_OCID=$OCI_TENANCY_OCID" >> .env
          echo "OCI_COMPARTMENT_OCID=$OCI_COMPARTMENT_OCID" >> .env
          echo "OCI_FINGERPRINT=$OCI_FINGERPRINT" >> .env
          echo "OCI_PRIVATE_KEY=\"$OCI_PRIVATE_KEY\"" >> .env
          echo "OCI_OCPUS=4" >> .env
          echo "OCI_MEMORY_IN_GBS=24" >> .env
          echo "OCI_BOOT_VOLUME_SIZE_IN_GBS=100" >> .env
          echo "OCI_DISPLAY_NAME=openclaw-server" >> .env
          
          # Menjalankan script pemburu server
          php index.php
