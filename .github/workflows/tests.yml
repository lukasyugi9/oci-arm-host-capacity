name: integration-tests

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run OCI Hunter Script
        env:
          OCI_REGION: ap-batam-1
          OCI_USER_ID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_BOOT_VOLUME_SIZE_IN_GBS: 100
          OCI_MAX_INSTANCES: 1
        run: |
          # Membuat file key.pem fisik secara otomatis dari GitHub Secrets
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          
          # Mendaftarkan lokasi file fisik ke environment variable
          export OCI_PRIVATE_KEY_FILENAME="key.pem"
          
          # Jalankan script utama
          php index.php
