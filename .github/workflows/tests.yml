name: integration-tests

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Generate Env and Run
        run: |
          echo "OCI_REGION=ap-batam-1" > .env
          echo "OCI_USER_ID=${{ secrets.OCI_USER_OCID }}" >> .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_OCID }}" >> .env
          echo "OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_OCID }}" >> .env
          echo "OCI_KEY_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> .env
          echo "OCI_PRIVATE_KEY_FILENAME=\"${{ secrets.OCI_PRIVATE_KEY }}\"" >> .env
          echo "OCI_BOOT_VOLUME_SIZE_IN_GBS=100" >> .env
          echo "OCI_SHAPE=VM.Standard.A1.Flex" >> .env
          echo "OCI_MAX_INSTANCES=1" >> .env
          echo "OCI_OCPUS=4" >> .env
          echo "OCI_MEMORY_IN_GBS=24" >> .env
          
          php index.php
